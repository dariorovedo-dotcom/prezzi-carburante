name: Aggiorna i dati

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 7 * * *'
    - cron: '0 8 * * *'
    - cron: '0 9 * * *'
    - cron: '0 10 * * *'
    - cron: '0 11 * * *'
    - cron: '0 12 * * *'
    - cron: '0 13 * * *'
    - cron: '0 14 * * *'
    - cron: '0 15 * * *'
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  controlla-e-aggiorna:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scarica i CSV dal MIMIT
        run: |
          echo "=== Download prezzo_alle_8.csv ==="
          curl -L -f -s \
            --max-time 60 \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            "https://www.mimit.gov.it/images/exportCSV/prezzo%20alle%208.csv" \
            -o prezzo_alle_8.csv
          echo "Dimensione prezzo_alle_8.csv: $(wc -c < prezzo_alle_8.csv) bytes"
          echo "Prime 2 righe prezzo_alle_8.csv:"
          head -2 prezzo_alle_8.csv

          echo "=== Download anagrafica_impianti_attivi.csv ==="
          curl -L -f -s \
            --max-time 60 \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            "https://www.mimit.gov.it/images/exportCSV/anagrafica_impianti_attivi.csv" \
            -o anagrafica_impianti_attivi.csv
          echo "Dimensione anagrafica: $(wc -c < anagrafica_impianti_attivi.csv) bytes"
          echo "Prime 2 righe anagrafica:"
          head -2 anagrafica_impianti_attivi.csv

      - name: Verifica che i file siano validi
        run: |
          # Controlla che i file contengano l'intestazione giusta
          if ! grep -q "idImpianto" prezzo_alle_8.csv; then
            echo "ERRORE: prezzo_alle_8.csv non contiene dati validi"
            cat prezzo_alle_8.csv | head -5
            exit 1
          fi
          if ! grep -q "idImpianto" anagrafica_impianti_attivi.csv; then
            echo "ERRORE: anagrafica_impianti_attivi.csv non contiene dati validi"
            cat anagrafica_impianti_attivi.csv | head -5
            exit 1
          fi
          echo "Entrambi i file sono validi."
          # Salva la data di estrazione
          head -1 prezzo_alle_8.csv > ultima_estrazione.txt
          echo "Data estrazione: $(cat ultima_estrazione.txt)"

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prezzo_alle_8.csv anagrafica_impianti_attivi.csv ultima_estrazione.txt
          if git diff --cached --quiet; then
            echo "Nessuna modifica, niente commit."
          else
            git commit -m "Aggiornamento dati: $(cat ultima_estrazione.txt)"
            git push
          fi
