name: Aggiorna dati carburante

on:
  schedule:
    - cron: '10 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Scarica repository
        uses: actions/checkout@v3

      - name: Scarica dataset carburanti
        run: |
          wget -O prezzo_alle_8.csv https://www.mimit.gov.it/images/exportCSV/prezzo_alle_8.csv || true
          wget -O anagrafica_impianti_attivi.csv https://www.mimit.gov.it/images/exportCSV/anagrafica_impianti_attivi.csv || true

      - name: Commit aggiornamenti
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add *.csv
          git commit -m "Aggiornamento automatico dati carburante" || echo "Nessuna modifica"
          git push
