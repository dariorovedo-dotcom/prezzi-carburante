name: Update Data

permissions:
  contents: write

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download anagrafica
        run: |
          curl -L --max-time 120 --retry 3 -o anagrafica_impianti_attivi.csv \
          https://www.mimit.gov.it/images/exportCSV/anagrafica_impianti_attivi.csv

      - name: Download prezzi
        run: |
          curl -L --max-time 120 --retry 3 -o prezzo_alle_8.csv \
          https://www.mimit.gov.it/images/exportCSV/prezzi.csv

      - name: Commit e push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add *.csv
          git diff --cached --quiet || git commit -m "Aggiorna dati carburante"
          git push origin principale
