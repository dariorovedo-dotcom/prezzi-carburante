name: Aggiorna i dati

on:
  schedule:
    # Ogni ora dalle 6:00 alle 16:00 UTC = 8:00-18:00 ora italiana (ora legale UTC+2)
    # In inverno (UTC+1) corrisponde alle 7:00-17:00 italiane — comunque adeguato
    - cron: '0 6 * * *'
    - cron: '0 7 * * *'
    - cron: '0 8 * * *'
    - cron: '0 9 * * *'
    - cron: '0 10 * * *'
    - cron: '0 11 * * *'
    - cron: '0 12 * * *'
    - cron: '0 13 * * *'
    - cron: '0 14 * * *'
    - cron: '0 15 * * *'
    - cron: '0 16 * * *'
  workflow_dispatch:  # permette anche l'avvio manuale

jobs:
  controlla-e-aggiorna:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scarica solo la prima riga del CSV prezzi
        run: |
          # Scarica il file completo e legge solo la prima riga
          PRIMA_RIGA=$(curl -s --globoff \
            --user-agent "Mozilla/5.0 (compatible; GitHub-Actions)" \
            "https://www.mimit.gov.it/images/exportCSV/prezzo%20alle%208.csv" \
            | head -1)
          echo "Prima riga trovata: $PRIMA_RIGA"
          echo "PRIMA_RIGA=$PRIMA_RIGA" >> $GITHUB_ENV

      - name: Controlla se i dati sono aggiornati
        run: |
          # Legge la data salvata nell'ultimo aggiornamento (se esiste)
          if [ -f "last_extraction.txt" ]; then
            ULTIMA=$(cat last_extraction.txt)
          else
            ULTIMA=""
          fi
          echo "Ultima estrazione salvata: $ULTIMA"
          echo "Nuova estrazione trovata: $PRIMA_RIGA"

          if [ -z "$PRIMA_RIGA" ]; then
            echo "Prima riga vuota (server non supporta range), forzo il download."
            echo "AGGIORNA=true" >> $GITHUB_ENV
          elif [ "$PRIMA_RIGA" = "$ULTIMA" ]; then
            echo "Dati invariati, nessun aggiornamento necessario."
            echo "AGGIORNA=false" >> $GITHUB_ENV
          else
            echo "Dati nuovi rilevati! Procedo con il download completo."
            echo "AGGIORNA=true" >> $GITHUB_ENV
          fi

      - name: Scarica i CSV completi (solo se ci sono dati nuovi)
        if: env.AGGIORNA == 'true'
        run: |
          curl -f -s --globoff \
            --user-agent "Mozilla/5.0 (compatible; GitHub-Actions)" \
            "https://www.mimit.gov.it/images/exportCSV/prezzo%20alle%208.csv" \
            -o prezzo_alle_8.csv || \
            { echo "❌ Errore download prezzo_alle_8.csv"; exit 1; }

          curl -f -s --globoff \
            --user-agent "Mozilla/5.0 (compatible; GitHub-Actions)" \
            "https://www.mimit.gov.it/images/exportCSV/anagrafica_impianti_attivi.csv" \
            -o anagrafica_impianti_attivi.csv || \
            { echo "❌ Errore download anagrafica"; exit 1; }

          # Salva la data di estrazione per il prossimo controllo
          echo "$PRIMA_RIGA" > last_extraction.txt
          echo "✅ CSV aggiornati e last_extraction.txt salvato."

      - name: Commit e push (solo se ci sono dati nuovi)
  run: |
    git config user.name "github-actions[bot]"
    git add .
    git commit -m "Aggiornamento dati"
    git push
