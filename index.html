<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prezzi carburante</title>

<style>
body{
  background:#111;
  color:#eee;
  font-family: "Arial", sans-serif;
  margin:0;
  padding:20px;
}

h1{
  color:#f59e0b;
}

select{
  padding:8px;
  margin:10px 0;
  width:100%;
}

.card{
  background:#1c1c1c;
  padding:12px;
  margin:10px 0;
  border-radius:6px;
}

.price{
  font-size:20px;
  color:#f59e0b;
}
</style>
</head>

<body>

<h1>Prezzi carburante</h1>

<select id="provincia"></select>
<select id="comune"></select>

<div id="results"></div>

<script>

let impianti = {};
let prezzi = [];

let province = [];
let comuni = {};

let provinciaSel="";
let comuneSel="";

async function caricaDati(){

  const imp = await fetch("./anagrafica_impianti_attivi.csv");
  const impText = await imp.text();

  const prz = await fetch("./prezzo_alle_8.csv");
  const przText = await prz.text();

  parseImpianti(impText);
  parsePrezzi(przText);

  buildProvince();

}

function parseCSV(text){

  let lines = text
    .replace(/\r\n/g,"\n")
    .replace(/\r/g,"\n")
    .trim()
    .split("\n");

  while(lines.length && !lines[0].includes("|") && !lines[0].includes(";")){
    lines.shift();
  }

  if(lines.length < 2) return [];

  const sep = lines[0].includes("|") ? "|" : ";";

  const headers = lines[0]
    .split(sep)
    .map(h => h.trim().replace(/"/g,""));

  const data = [];

  for(let i=1;i<lines.length;i++){

    if(!lines[i].trim()) continue;

    const cols = lines[i].split(sep);

    const row = {};

    headers.forEach((h,j)=>{
      row[h] = (cols[j] || "").trim().replace(/"/g,"");
    });

    data.push(row);

  }

  return data;
}

  return data;

}

function parseImpianti(text){

  const rows = parseCSV(text);

  rows.forEach(r=>{

    const id = r.idImpianto || r.id_impianto;

    if(!id) return;

    impianti[id] = r;

    const prov = r.Provincia?.toUpperCase();
    const com = r.Comune?.toUpperCase();

    if(!province.includes(prov)) province.push(prov);

    if(!comuni[prov]) comuni[prov]=[];

    if(!comuni[prov].includes(com)) comuni[prov].push(com);

  });

}

function parsePrezzi(text){

  prezzi = parseCSV(text);

}

function buildProvince(){

  const sel = document.getElementById("provincia");

  sel.innerHTML="<option>Seleziona provincia</option>";

  province.sort().forEach(p=>{

    const o=document.createElement("option");

    o.value=p;
    o.textContent=p;

    sel.appendChild(o);

  });

}

document.getElementById("provincia").addEventListener("change",e=>{

  provinciaSel=e.target.value;

  const sel=document.getElementById("comune");

  sel.innerHTML="";

  (comuni[provinciaSel] || []).sort().forEach(c=>{

    const o=document.createElement("option");

    o.value=c;
    o.textContent=c;

    sel.appendChild(o);

  });

});

document.getElementById("comune").addEventListener("change",e=>{

  comuneSel=e.target.value;

  mostraRisultati();

});

function mostraRisultati(){

  const res=document.getElementById("results");

  res.innerHTML="";

  const list=[];

  prezzi.forEach(p=>{

    const id=p.idImpianto || p.id_impianto;

    const imp=impianti[id];

    if(!imp) return;

    if(imp.Provincia?.toUpperCase()!==provinciaSel) return;

    if(imp.Comune?.toUpperCase()!==comuneSel) return;

    list.push({
      nome: imp.Gestore,
      indirizzo: imp.Indirizzo,
      prezzo: parseFloat(p.prezzo || p.Prezzo || 0)
    });

  });

  list.sort((a,b)=>a.prezzo-b.prezzo);

  list.slice(0,20).forEach(r=>{

    const div=document.createElement("div");

    div.className="card";

    div.innerHTML=`
      <div>${r.nome}</div>
      <div>${r.indirizzo}</div>
      <div class="price">${r.prezzo.toFixed(3)} €</div>
    `;

    res.appendChild(div);

  });

}

window.onload=caricaDati;

</script>

</body>
</html>
